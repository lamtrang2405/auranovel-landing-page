<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AuraNovel — Discover Your Next Obsession</title>
    <meta
      name="description"
      content="AuraNovel is a modern novel app with binge-worthy stories, personalized recommendations, offline reading, and a cozy reader built for long sessions."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page">
      <header class="header">
        <a class="logo" href="./">
          <span class="logo-icon" aria-hidden="true">AN</span>
          <span class="logo-text">AuraNovel</span>
        </a>
      </header>

      <main class="main">
        <div class="main-inner">
          <div class="copy">
            <h1 class="headline">
              Discover your next <span class="highlight">favorite novel</span> tonight
            </h1>
            <p class="description">
              Free novels you’ll love — with offline reading and smart recommendations.
            </p>
          </div>

          <div class="cards-wrap" id="featured" aria-label="Featured novels carousel">
            <div class="carousel" aria-live="off">
              <div class="carousel-track" aria-label="Novel covers">
                <a class="carousel-item" href="#get-the-app" data-title="One Night with Mr Billionaire">
                  <img src="./assets/cover-1.png" alt="One Night with Mr Billionaire cover" loading="eager" />
                </a>
                <a class="carousel-item" href="#get-the-app" data-title="She's Ours to Tame">
                  <img src="./assets/cover-2.png" alt="She's Ours to Tame cover" loading="eager" />
                </a>
                <a class="carousel-item" href="#get-the-app" data-title="Sold to the Lycan King">
                  <img src="./assets/cover-3.png" alt="Sold to the Lycan King cover" loading="eager" />
                </a>
                <a class="carousel-item" href="#get-the-app" data-title="Pregnant With Four Alphas' Babies">
                  <img src="./assets/cover-4.png" alt="Pregnant With Four Alphas' Babies cover" loading="eager" />
                </a>
                <a class="carousel-item" href="#get-the-app" data-title="Saint">
                  <img src="./assets/cover-5.png" alt="Saint cover" loading="eager" />
                </a>
              </div>
            </div>
          </div>

          <div class="cta" id="get-the-app">
            <div class="store-buttons" role="group" aria-label="Download buttons">
              <a class="store-btn store-btn--apple" href="https://apps.apple.com/" aria-label="Download on the App Store">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                  <path
                    d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"
                  />
                </svg>
                <span class="store-btn-labels">
                  <span class="store-btn-label">Download on the</span>
                  <span class="store-btn-name">App Store</span>
                </span>
              </a>

              <a class="store-btn store-btn--google" href="https://play.google.com/store" aria-label="Get it on Google Play">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                  <path
                    d="M3.18 23.64c.36.17.76.22 1.15.13l11.28-5.27L7.2 10.09 3.18 23.64zM.63 1.35c-.12.36-.13.76.01 1.12L6.59 12 .64 22.53c-.25.53-.14 1.15.26 1.55L7.2 10.09.63 1.35zm20.87 9.43l-3.55-2.07L12.89 12l5.06 3.29 3.55-2.07c.82-.48.82-1.68 0-2.37zM8.01 4.56l7.62 8.43 3.01-1.96L8.24 4.14c-.45-.26-.98-.01-.23.42z"
                  />
                </svg>
                <span class="store-btn-labels">
                  <span class="store-btn-label">Get it on</span>
                  <span class="store-btn-name">Google Play</span>
                </span>
              </a>
            </div>

            <div class="features-list" aria-label="Highlights">
              <span class="feature-item">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <polyline points="20 6 9 17 4 12"></polyline>
                </svg>
                Free to download
              </span>
              <span class="feature-item">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <polyline points="20 6 9 17 4 12"></polyline>
                </svg>
                Offline reading
              </span>
              <span class="feature-item">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <polyline points="20 6 9 17 4 12"></polyline>
                </svg>
                Cancel anytime
              </span>
            </div>
          </div>
        </div>
      </main>

      <footer class="page-footer">
        <a href="./privacy.html">Privacy Policy</a>
        <a href="./terms.html">Terms of Use</a>
        <a href="./contact.html">Contact</a>
      </footer>
    </div>
    <script src="./script.js"></script>
  </body>
</html>
