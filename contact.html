<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AuraNovel — Contact</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        margin: 0;
        font-family: "Plus Jakarta Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #140a22;
        color: #efeaf7;
      }
      main {
        max-width: 860px;
        margin: 0 auto;
        padding: 48px 20px;
        line-height: 1.7;
      }
      a {
        color: #c4b5fd;
      }
      h1 {
        font-size: 2rem;
        margin: 0 0 0.75rem;
      }
      p {
        color: #cfc7db;
      }
      .back {
        display: inline-block;
        margin-bottom: 18px;
        text-decoration: none;
        color: #9ca3af;
      }
      .card {
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 16px;
        padding: 18px 18px;
        background: rgba(255, 255, 255, 0.04);
      }
      .row {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }
      .pill {
        padding: 10px 12px;
        border-radius: 999px;
        border: 1px solid rgba(255, 255, 255, 0.14);
        background: rgba(255, 255, 255, 0.06);
        color: #e8e4ef;
        text-decoration: none;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <main>
      <a class="back" href="./index.html">← Back to Home</a>
      <h1>Contact</h1>
      <div class="card">
        <p>Replace these placeholders with your real support links.</p>
        <div class="row">
          <a class="pill" href="mailto:support@auranovel.example">support@auranovel.example</a>
          <a class="pill" href="https://example.com">Help Center</a>
        </div>
      </div>
    </main>
  </body>
</html>
